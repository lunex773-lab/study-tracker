<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1E2749">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="学習トラッカー">
<title>学習トラッカー｜志望校カウントダウン</title>
<style>
  :root{
    --ink:#1E2749; --ink-soft:#5A6486; --paper:#EDEFF4; --card:#fff;
    --line:#D9DDE7; --brand:#3B5BA5; --urgent:#D7574B; --field:#F7F8FB; --ok:#2F7A52;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{
    background:var(--paper); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic","Noto Sans JP",Meiryo,sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.5;
  }
  .mono{font-family:"SF Mono","SFMono-Regular","Roboto Mono",Menlo,Consolas,monospace;font-variant-numeric:tabular-nums;}
  #app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--paper);}
  button{font-family:inherit;cursor:pointer;border:none;background:none;}
  input,textarea{font-family:inherit;}

  /* header */
  .header{padding:20px 20px 16px;}
  .hrow{display:flex;justify-content:space-between;align-items:flex-start;}
  .brand{font-size:11px;font-weight:700;letter-spacing:.18em;}
  .aim{font-size:14px;font-weight:600;margin-top:2px;}
  .setbtn{font-size:12px;font-weight:600;padding:4px 10px;border-radius:7px;}
  .count{display:flex;align-items:flex-end;gap:10px;margin-top:14px;}
  .clabel{font-size:14px;font-weight:500;padding-bottom:7px;}
  .cnum{font-family:"SF Mono","Roboto Mono",Menlo,monospace;font-variant-numeric:tabular-nums;font-weight:700;font-size:46px;line-height:.9;letter-spacing:-.02em;}
  .cunit{font-size:16px;font-weight:700;padding-bottom:5px;}
  .settings{margin-top:14px;border-radius:10px;padding:14px;}
  .slabel{display:block;font-size:13px;font-weight:700;margin-bottom:7px;}
  .dateinput{background:var(--field);border:1px solid var(--line);color:var(--ink);font-size:14px;padding:8px 11px;border-radius:8px;}
  .dateinput.light{background:#fff;border:none;}
  .textinput{width:100%;background:#fff;color:var(--ink);font-size:15px;padding:10px 12px;border-radius:8px;border:none;}
  .textinput:focus{outline:none;}
  .themerow{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
  .tswatch{width:30px;height:30px;border-radius:8px;border:2px solid rgba(255,255,255,.55);padding:0;cursor:pointer;}
  .bkrow{display:flex;gap:8px;margin-top:6px;}
  .bkbtn{flex:1;font-size:14px;font-weight:700;padding:10px 6px;border-radius:8px;text-align:center;}
  .bkhint{font-size:12.5px;margin-top:9px;line-height:1.6;}
  .reset{display:block;margin-top:16px;font-size:13px;font-weight:600;}

  /* tabs */
  .tabs{display:flex;background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10;}
  .tab{flex:1;padding:13px 0;font-size:14px;font-weight:600;color:var(--ink-soft);border-bottom:2px solid transparent;position:relative;}
  .tab.active{color:var(--ink);border-bottom-color:var(--brand);}
  .badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;margin-left:5px;border-radius:9px;background:var(--urgent);color:#fff;font-size:11px;font-weight:700;vertical-align:middle;}

  .body{padding:16px;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
  @keyframes rise{from{transform:translateY(20px);}to{transform:none;}}
  .foot{text-align:center;font-size:12px;color:#9AA1B5;padding:8px 16px 26px;line-height:1.55;}

  .sect{margin-bottom:18px;}
  .h2{font-size:15px;font-weight:700;margin-bottom:10px;}
  .h3{font-size:13px;font-weight:700;color:var(--ink-soft);margin-bottom:8px;}
  .empty{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:28px 18px;text-align:center;font-size:14px;color:var(--ink-soft);line-height:1.7;}
  .list{display:flex;flex-direction:column;gap:8px;}
  .dot{display:inline-block;width:11px;height:11px;border-radius:50%;flex-shrink:0;}
  .dot.sm{width:9px;height:9px;}

  /* review cards */
  .rcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;display:flex;align-items:flex-start;gap:11px;}
  .rcard.over{border-color:var(--urgent);}
  .rcard .dot{margin-top:4px;}
  .rbody{flex:1;min-width:0;}
  .rmeta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
  .rsub{font-size:12px;font-weight:700;color:var(--ink-soft);}
  .rtag{font-size:11px;font-weight:600;padding:2px 6px;border-radius:5px;background:#EAEFF8;color:var(--brand);}
  .rtag.tagover{background:#FBE9E7;color:var(--urgent);}
  .overlbl{font-size:11px;font-weight:700;color:var(--urgent);}
  .rcontent{font-size:14px;font-weight:500;margin-top:4px;word-break:break-word;}
  .done{flex-shrink:0;font-size:12px;font-weight:700;color:#fff;background:var(--brand);padding:8px 12px;border-radius:9px;}
  .done:active{opacity:.8;}

  /* upcoming / recent */
  .ucard{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8px 11px;display:flex;align-items:center;gap:9px;font-size:13px;}
  .udate{font-size:12px;color:var(--ink-soft);flex-shrink:0;}
  .ustage{font-size:11px;color:var(--ink-soft);flex-shrink:0;}
  .utext{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .utime{font-size:12px;font-weight:600;color:var(--ink-soft);flex-shrink:0;}
  .rechead{display:flex;justify-content:space-between;align-items:center;}
  .recdel{flex-shrink:0;width:30px;height:30px;border-radius:7px;color:#fff;background:#C7CDDA;font-size:13px;font-weight:700;line-height:1;}
  .recdel:active{background:var(--urgent);}

  /* form */
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:18px;}
  .field{display:flex;flex-direction:column;}
  .fhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .flabel{font-size:12px;font-weight:700;color:var(--ink-soft);margin-bottom:8px;}
  .fhead .flabel{margin-bottom:0;}
  .link{font-size:12px;font-weight:600;color:var(--brand);}
  .chips{display:flex;flex-wrap:wrap;gap:8px;}
  .chip{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;padding:7px 12px;border-radius:999px;background:#F2F4F8;border:1px solid var(--line);color:var(--ink);}
  .addrow{display:flex;gap:8px;margin-top:12px;}
  .input{width:100%;background:var(--field);border:1px solid var(--line);border-radius:9px;padding:10px 12px;font-size:14px;color:var(--ink);}
  .input:focus{outline:none;border-color:var(--brand);}
  .addbtn{flex-shrink:0;font-size:14px;font-weight:700;color:#fff;background:var(--brand);padding:0 16px;border-radius:9px;}
  .editlist{display:flex;flex-direction:column;gap:8px;}
  .editrow{display:flex;align-items:center;gap:11px;background:var(--field);border:1px solid var(--line);border-radius:10px;padding:8px 10px 8px 12px;}
  .editname{flex:1;font-size:14px;font-weight:600;color:var(--ink);}
  .delbtn{flex-shrink:0;font-size:12px;font-weight:700;color:var(--urgent);background:#FBE9E7;padding:7px 12px;border-radius:8px;}
  .edithint{font-size:12.5px;color:var(--ink-soft);margin-top:11px;line-height:1.55;}
  input[type=color].colorswatch{-webkit-appearance:none;appearance:none;width:30px;height:30px;flex-shrink:0;border:none;border-radius:8px;padding:0;background:none;cursor:pointer;}
  input[type=color].colorswatch::-webkit-color-swatch-wrapper{padding:0;}
  input[type=color].colorswatch::-webkit-color-swatch{border:1px solid rgba(0,0,0,.18);border-radius:8px;}
  .timerow{display:flex;align-items:center;gap:8px;}
  .numin{width:60px;text-align:center;background:var(--field);border:1px solid var(--line);border-radius:9px;padding:10px 4px;font-size:14px;color:var(--ink);}
  .numin:focus{outline:none;border-color:var(--brand);}
  .unit{font-size:14px;color:var(--ink-soft);}
  .quick{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
  .qbtn{font-size:12px;font-weight:600;color:var(--ink-soft);background:#F2F4F8;border:1px solid var(--line);padding:5px 10px;border-radius:999px;}
  .save{width:100%;padding:13px;border-radius:10px;font-size:14px;font-weight:700;color:#fff;background:var(--brand);transition:opacity .15s;}
  .save:active{opacity:.85;}
  .save.dis{opacity:.4;}
  .preview{font-size:12.5px;color:var(--ink-soft);text-align:center;line-height:1.5;}

  /* stats */
  .toggle{display:inline-flex;background:#E3E7EF;border:1px solid var(--line);border-radius:10px;padding:3px;margin-bottom:8px;}
  .tg{font-size:12.5px;font-weight:700;color:var(--ink-soft);padding:7px 13px;border-radius:7px;}
  .tg.on{background:var(--card);color:var(--ink);}
  .pcap{font-size:12px;color:var(--ink-soft);margin:0 2px 14px;}
  .totwrap{text-align:center;}
  .totlbl{font-size:12px;font-weight:600;color:var(--ink-soft);}
  .totnum{font-size:30px;font-weight:700;letter-spacing:-.01em;}
  .donutwrap{display:flex;justify-content:center;margin:4px 0 8px;}
  .donut{width:200px;height:200px;display:block;}
  .legend{display:flex;flex-direction:column;gap:9px;}
  .leg{display:flex;align-items:center;gap:9px;font-size:13px;}
  .lname{font-weight:600;width:96px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .lbar{flex:1;height:8px;border-radius:999px;background:#EEF0F4;overflow:hidden;}
  .lfill{display:block;height:100%;}
  .ltime{font-size:11px;color:var(--ink-soft);width:74px;text-align:right;flex-shrink:0;}
  .lpct{font-size:11px;font-weight:700;width:38px;text-align:right;flex-shrink:0;}
  .grand{margin-top:14px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;}
  .grandlbl{font-size:13px;font-weight:600;color:var(--ink-soft);}
  .grandnum{font-size:18px;font-weight:700;}

  /* summer goal */
  .card.gcard{gap:12px;margin-bottom:16px;}
  .ghead{display:flex;justify-content:space-between;align-items:center;}
  .gtitle{font-size:13px;font-weight:700;color:var(--ink-soft);}
  .gtext{font-size:12.5px;color:var(--ink-soft);line-height:1.6;}
  .grow{display:flex;align-items:center;gap:8px;}
  .ginput{width:92px;}
  .gactions{display:flex;gap:18px;}
  .gmain{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;}
  .gpct{font-size:26px;font-weight:700;letter-spacing:-.01em;}
  .gnums{font-size:13px;color:var(--ink);font-weight:600;}
  .gbar{height:10px;border-radius:999px;background:#EEF0F4;overflow:hidden;}
  .gfill{display:block;height:100%;background:var(--brand);}
  .gfill.okbar{background:var(--ok);}
  .gsub{font-size:12.5px;color:var(--ink-soft);line-height:1.7;}
  .gok{color:var(--ok);font-weight:700;}
  .gwarn{color:var(--urgent);font-weight:700;}

  /* modal / confirm / toast */
  .overlay{position:fixed;inset:0;background:rgba(18,22,38,.55);display:flex;align-items:flex-end;justify-content:center;z-index:50;animation:fade .2s ease;}
  .overlay.center{align-items:center;padding:24px;z-index:60;}
  .modal{background:var(--card);width:100%;max-width:480px;border-radius:18px 18px 0 0;padding:20px 18px calc(22px + env(safe-area-inset-bottom));max-height:86vh;overflow:auto;animation:rise .25s ease;}
  .modal.small{border-radius:16px;max-width:360px;width:auto;padding:22px 20px;}
  .mtitle{font-size:17px;font-weight:700;margin-bottom:10px;color:var(--ink);}
  .mtext{font-size:13px;color:var(--ink-soft);line-height:1.65;margin-bottom:12px;}
  .cfmsg{font-size:15px;color:var(--ink);line-height:1.6;}
  .marea{width:100%;height:150px;font-family:"SF Mono","Roboto Mono",Menlo,monospace;font-size:11px;background:var(--field);border:1px solid var(--line);border-radius:10px;padding:11px;color:var(--ink);resize:none;line-height:1.4;}
  .marea:focus{outline:none;border-color:var(--brand);}
  .mbtns{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;}
  .mbtn{flex:1;min-width:104px;padding:13px;border-radius:10px;font-size:14px;font-weight:700;background:var(--brand);color:#fff;text-align:center;}
  .mbtn:active{opacity:.85;}
  .mbtn.sec{background:#EEF1F6;color:var(--ink);}
  .mbtn.danger{background:var(--urgent);}
  .toast{position:fixed;left:50%;bottom:36px;transform:translateX(-50%) translateY(16px);background:rgba(30,39,73,.96);color:#fff;font-size:14px;font-weight:600;padding:12px 20px;border-radius:12px;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;max-width:86%;text-align:center;box-shadow:0 8px 28px rgba(0,0,0,.28);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media (prefers-reduced-motion: reduce){.body,.overlay,.modal{animation:none;}}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
  'use strict';

  const STORAGE_KEY='kobe-study-tracker:v1';
  const DAY=86400000;

  const DEFAULT_SUBJECTS=[
    {name:'国語', color:'#E4434A'},
    {name:'数学IA', color:'#2D74C4'},
    {name:'数学IIBC', color:'#8B4FCB'},
    {name:'英語リーディング', color:'#34A05A'},
    {name:'英語リスニング', color:'#14A8B8'},
    {name:'物理基礎', color:'#F0822E'},
    {name:'化学基礎', color:'#D9A41F'},
    {name:'地理総合', color:'#E467A6'},
    {name:'政治経済', color:'#8A5A3C'},
    {name:'情報', color:'#5B6477'},
  ];
  const FALLBACK=['#E4434A','#2D74C4','#34A05A','#F0822E','#8B4FCB','#14A8B8','#E467A6','#D9A41F','#8A5A3C','#5B6477'];
  const DEFAULT_EXAM='2027-01-17';
  const DEFAULT_SCHOOL='神戸大学';
  const DEFAULT_THEME='#1E2749';
  const THEME_PRESETS=['#1E2749','#222831','#17352B','#3A2342','#13324A','#3A2018'];
  const SUMMER_START='2026-07-01';
  const SUMMER_END='2026-08-31';
  const COLOR_VER=2;
  const OLD_DEFAULTS={'国語':'#C0504D','数学IA':'#3B5BA5','数学IIBC':'#6E8FD6','英語リーディング':'#2F7A52','英語リスニング':'#5FA88F','物理基礎':'#E0A458','化学基礎':'#8E6FB0','地理総合':'#5B9279','政治経済':'#9A7B4F','情報':'#4A4E69'};
  const STAGES=[
    {key:'day1',label:'1日後',short:'1日',days:1},
    {key:'week1',label:'1週間後',short:'1週',days:7},
    {key:'month1',label:'1ヶ月後',short:'1月',days:30},
  ];

  /* helpers */
  function uid(){return Math.random().toString(36).slice(2,10);}
  function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
  function startOfDay(d){const x=new Date(d);x.setHours(0,0,0,0);return x;}
  function parseDate(s){const p=s.split('-').map(Number);return new Date(p[0],p[1]-1,p[2]);}
  function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x;}
  function isoDate(d){const x=new Date(d);return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');}
  function todayISO(){return isoDate(new Date());}
  function fmtMD(d){return (d.getMonth()+1)+'月'+d.getDate()+'日';}
  function fmtMin(min){const h=Math.floor(min/60),m=min%60;if(h&&m)return h+'時間'+m+'分';if(h)return h+'時間';return m+'分';}
  function luminance(hex){
    let c=String(hex||'').replace('#','');
    if(c.length===3)c=c[0]+c[0]+c[1]+c[1]+c[2]+c[2];
    if(c.length<6)return 0;
    const r=parseInt(c.substr(0,2),16)/255,g=parseInt(c.substr(2,2),16)/255,b=parseInt(c.substr(4,2),16)/255;
    const f=v=>v<=0.03928?v/12.92:Math.pow((v+0.055)/1.055,2.4);
    return 0.2126*f(r)+0.7152*f(g)+0.0722*f(b);
  }
  function headerTheme(bg){
    const dark=luminance(bg)<0.5;
    if(dark)return {bg:bg,main:'#ffffff',sub:'rgba(255,255,255,0.82)',faint:'rgba(255,255,255,0.6)',btn:'rgba(255,255,255,0.15)',panel:'rgba(255,255,255,0.08)',panelLabel:'rgba(255,255,255,0.9)',hint:'rgba(255,255,255,0.7)',low:'#FF8A7A',reset:'#FF8A7A',swEdge:'rgba(255,255,255,0.75)'};
    return {bg:bg,main:'#1E2749',sub:'rgba(30,39,73,0.78)',faint:'rgba(30,39,73,0.5)',btn:'rgba(0,0,0,0.07)',panel:'rgba(0,0,0,0.05)',panelLabel:'rgba(30,39,73,0.85)',hint:'rgba(30,39,73,0.6)',low:'#C0392B',reset:'#C0392B',swEdge:'rgba(30,39,73,0.4)'};
  }

  /* lightweight in-app toast (works without native popups) */
  let toastTimer=null;
  function toast(msg){
    let el=document.getElementById('toastBar');
    if(!el){el=document.createElement('div');el.id='toastBar';el.className='toast';document.body.appendChild(el);}
    el.textContent=msg;el.classList.add('show');
    if(toastTimer)clearTimeout(toastTimer);
    toastTimer=setTimeout(function(){el.classList.remove('show');},2200);
  }

  /* storage (localStorage + in-memory fallback) */
  function load(){try{const r=localStorage.getItem(STORAGE_KEY);if(r)return JSON.parse(r);}catch(e){}return null;}
  function persist(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(data));}catch(e){}}
  function defaultData(){return {school:DEFAULT_SCHOOL,themeColor:DEFAULT_THEME,summerGoalHours:null,subjects:DEFAULT_SUBJECTS.map(s=>({name:s.name,color:s.color})),entries:[],examDate:DEFAULT_EXAM,colorVer:COLOR_VER};}

  let data=load()||defaultData();
  if(!data.subjects||!data.subjects.length)data.subjects=DEFAULT_SUBJECTS.map(s=>({name:s.name,color:s.color}));
  if(!Array.isArray(data.entries))data.entries=[];
  if(!data.examDate)data.examDate=DEFAULT_EXAM;
  if(typeof data.school!=='string')data.school=DEFAULT_SCHOOL;
  if(typeof data.themeColor!=='string')data.themeColor=DEFAULT_THEME;
  if(!(typeof data.summerGoalHours==='number'&&data.summerGoalHours>0))data.summerGoalHours=null;
  if(data.colorVer!==COLOR_VER){
    const nd={};DEFAULT_SUBJECTS.forEach(s=>nd[s.name]=s.color);
    data.subjects.forEach(s=>{
      if(OLD_DEFAULTS[s.name]&&typeof s.color==='string'&&s.color.toLowerCase()===OLD_DEFAULTS[s.name].toLowerCase()&&nd[s.name]){s.color=nd[s.name];}
    });
    const sm={};data.subjects.forEach(s=>sm[s.name]=s.color);
    data.entries.forEach(e=>{if(sm[e.subject])e.color=sm[e.subject];});
    data.colorVer=COLOR_VER;
    persist();
  }

  let ui={tab:'review',editSubjects:false,statsRange:'week',settingsOpen:false,modal:null,modalText:'',showAllRecords:false,confirm:null,editGoal:false};
  let form={subjectIdx:0,content:'',hours:'',mins:'',date:todayISO()};

  /* import (shared by text-paste and file) */
  function applyImport(text){
    let obj;
    try{obj=JSON.parse(text);}catch(e){toast('読み込み失敗：文章が正しくない可能性があります');return;}
    if(!obj||!Array.isArray(obj.entries)||!Array.isArray(obj.subjects)){toast('このアプリのバックアップではないようです');return;}
    App.askConfirm('現在の学習データを、このバックアップの内容で置き換えます。よろしいですか？',function(){
      data=obj;
      if(!data.examDate)data.examDate=DEFAULT_EXAM;
      if(typeof data.school!=='string')data.school=DEFAULT_SCHOOL;
      if(typeof data.themeColor!=='string')data.themeColor=DEFAULT_THEME;
      if(typeof data.colorVer!=='number')data.colorVer=COLOR_VER;
      if(!(typeof data.summerGoalHours==='number'&&data.summerGoalHours>0))data.summerGoalHours=null;
      persist();ui.modal=null;ui.settingsOpen=false;render();toast('学習データを読み込みました');
    },{yes:'置き換える'});
  }

  /* donut chart (manual SVG, no libraries) */
  function polar(cx,cy,r,deg){const rad=deg*Math.PI/180;return [cx+r*Math.sin(rad),cy-r*Math.cos(rad)];}
  function arc(cx,cy,rO,rI,a0,a1){
    const large=(a1-a0)>180?1:0;
    const o0=polar(cx,cy,rO,a0),o1=polar(cx,cy,rO,a1),i1=polar(cx,cy,rI,a1),i0=polar(cx,cy,rI,a0);
    return 'M '+o0[0]+' '+o0[1]+' A '+rO+' '+rO+' 0 '+large+' 1 '+o1[0]+' '+o1[1]+
           ' L '+i1[0]+' '+i1[1]+' A '+rI+' '+rI+' 0 '+large+' 0 '+i0[0]+' '+i0[1]+' Z';
  }
  function donut(slices,total){
    const cx=100,cy=100,rO=84,rI=52;
    if(slices.length===1){
      return '<svg viewBox="0 0 200 200" class="donut"><circle cx="100" cy="100" r="'+rO+'" fill="'+slices[0].color+'"/><circle cx="100" cy="100" r="'+rI+'" fill="#fff"/></svg>';
    }
    let a=0,paths='';
    slices.forEach(s=>{const sweep=s.minutes/total*360;paths+='<path d="'+arc(cx,cy,rO,rI,a,a+sweep)+'" fill="'+s.color+'" stroke="#fff" stroke-width="2"/>';a+=sweep;});
    return '<svg viewBox="0 0 200 200" class="donut">'+paths+'</svg>';
  }

  /* computed */
  function dueItems(){
    const t=startOfDay(new Date()).getTime();
    const due=[],up=[];
    data.entries.forEach(e=>{
      STAGES.forEach(st=>{
        if(e.reviews[st.key])return;
        const dd=startOfDay(addDays(parseDate(e.date),st.days));
        const item={e,st,dd,over:dd.getTime()<t};
        if(dd.getTime()<=t)due.push(item);
        else if(dd.getTime()<=t+7*DAY)up.push(item);
      });
    });
    due.sort((a,b)=>a.dd-b.dd||a.st.days-b.st.days);
    up.sort((a,b)=>a.dd-b.dd);
    return {due,up};
  }
  function dueCount(){return dueItems().due.length;}
  function rangeWindow(range){
    const todayT=startOfDay(new Date()).getTime();
    if(range==='week')return {from:todayT-6*DAY,to:todayT};
    if(range==='month')return {from:todayT-29*DAY,to:todayT};
    if(range==='summer')return {from:startOfDay(parseDate(SUMMER_START)).getTime(),to:startOfDay(parseDate(SUMMER_END)).getTime()};
    return {from:-Infinity,to:Infinity};
  }
  function statsData(){
    const w=rangeWindow(ui.statsRange);
    const map={};let total=0;
    data.entries.forEach(e=>{
      const d=startOfDay(parseDate(e.date)).getTime();
      if(d<w.from||d>w.to)return;
      if(!map[e.subject])map[e.subject]={name:e.subject,color:e.color,minutes:0};
      map[e.subject].minutes+=e.minutes;total+=e.minutes;
    });
    return {slices:Object.values(map).sort((a,b)=>b.minutes-a.minutes),total};
  }
  function isValid(){return !!data.subjects[form.subjectIdx]&&form.content.trim()!==''&&((parseInt(form.hours)||0)*60+(parseInt(form.mins)||0))>0;}

  function summerGoalHTML(done){
    const goalH=data.summerGoalHours;
    const hasGoal=typeof goalH==='number'&&goalH>0;
    if(!hasGoal||ui.editGoal){
      return '<div class="card gcard">'+
        '<div class="ghead"><span class="gtitle">夏期の目標学習時間</span></div>'+
        '<p class="gtext">夏休み全体（7月1日〜8月31日）の目標を時間で設定すると、達成に必要な1日あたりのペースを自動で計算します。予備校の課題量から逆算して決めるのがおすすめです。</p>'+
        '<div class="grow"><input id="goalInput" type="number" min="1" max="9999" inputmode="numeric" class="numin ginput" placeholder="例：300" value="'+(hasGoal?goalH:'')+'"/><span class="unit">時間</span>'+
        '<button class="addbtn" onclick="App.setGoal()">'+(hasGoal?'保存':'設定する')+'</button></div>'+
        (hasGoal?'<div class="gactions"><button class="link" onclick="App.cancelGoalEdit()">キャンセル</button><button class="link" style="color:var(--urgent)" onclick="App.clearGoal()">目標を削除</button></div>':'')+
        '</div>';
    }
    const goalMin=goalH*60;
    const pct=Math.round(done/goalMin*100);
    const achieved=done>=goalMin;
    const today=startOfDay(new Date()).getTime();
    const sStart=startOfDay(parseDate(SUMMER_START)).getTime();
    const sEnd=startOfDay(parseDate(SUMMER_END)).getTime();
    let remainDays=0;
    if(today<sStart)remainDays=Math.round((sEnd-sStart)/DAY)+1;
    else if(today<=sEnd)remainDays=Math.round((sEnd-today)/DAY)+1;
    const remainMin=Math.max(0,goalMin-done);
    let avg=null;
    if(today>=sStart){
      const elapsed=Math.round((Math.min(today,sEnd)-sStart)/DAY)+1;
      if(elapsed>0)avg=Math.round(done/elapsed);
    }
    let lines=[];
    if(achieved){
      lines.push('<span class="gok">目標を達成しました。</span>この調子で最後まで積み上げていきましょう。');
      if(avg!==null)lines.push('これまでの1日平均：'+fmtMin(avg));
    }else if(remainDays>0){
      const need=Math.ceil(remainMin/remainDays);
      lines.push('残り <b>'+remainDays+'日</b> ・ 1日あたり <b>約'+fmtMin(need)+'</b> のペースで達成できます。');
      if(avg!==null){
        const judge=avg>=need?'<span class="gok">今の平均ペースを保てば達成できます。</span>':'<span class="gwarn">達成には今よりペースを上げる必要があります。</span>';
        lines.push('これまでの1日平均は '+fmtMin(avg)+' — '+judge);
      }
    }else{
      lines.push('夏休みの期間（8月31日まで）は終了しました。');
      if(avg!==null)lines.push('期間中の1日平均：'+fmtMin(avg));
    }
    return '<div class="card gcard">'+
      '<div class="ghead"><span class="gtitle">夏期の目標</span><button class="link" onclick="App.editGoal()">変更</button></div>'+
      '<div><div class="gmain"><span class="gpct mono" style="color:'+(achieved?'var(--ok)':'var(--ink)')+'">'+pct+'%</span>'+
      '<span class="gnums mono">'+fmtMin(done)+' ／ '+goalH+'時間</span></div>'+
      '<div class="gbar" style="margin-top:9px"><span class="gfill'+(achieved?' okbar':'')+'" style="width:'+Math.min(100,pct)+'%"></span></div></div>'+
      '<p class="gsub">'+lines.join('<br>')+'</p>'+
      '</div>';
  }

  /* keeps focus while typing: updates only the save button + preview */
  function refresh(){
    const v=isValid();
    const btn=document.getElementById('saveBtn');
    if(btn){btn.disabled=!v;btn.classList.toggle('dis',!v);}
    const p=document.getElementById('prev');
    if(p){
      if(v){const d=parseDate(form.date);p.textContent='この内容の復習日：'+fmtMD(addDays(d,1))+'・'+fmtMD(addDays(d,7))+'・'+fmtMD(addDays(d,30));p.style.display='block';}
      else p.style.display='none';
    }
  }

    setExam(v){data.examDate=v;persist();render();},
    setSchool(v){data.school=v.trim();persist();render();},
    setTheme(v){data.themeColor=v;persist();render();},
    askConfirm(message,onYes,opts){ui.confirm={message:message,onYes:onYes,yes:(opts&&opts.yes)||'OK',danger:!!(opts&&opts.danger)};render();},
    confirmYes(){const f=ui.confirm&&ui.confirm.onYes;ui.confirm=null;render();if(typeof f==='function')f();},
    confirmNo(){ui.confirm=null;render();},
    reset(){App.askConfirm('すべての学習データを削除します。この操作は取り消せません。\n\n念のため、先に「書き出す」でバックアップを取っておくことをおすすめします。',function(){data=defaultData();ui={tab:'review',editSubjects:false,statsRange:'week',settingsOpen:false,modal:null,modalText:'',showAllRecords:false,confirm:null,editGoal:false};form={subjectIdx:0,content:'',hours:'',mins:'',date:todayISO()};persist();render();toast('すべてのデータを削除しました');},{yes:'削除する',danger:true});},
    markDone(id,key){const e=data.entries.find(x=>x.id===id);if(e){e.reviews[key]=true;persist();render();toast('復習を1件完了にしました');}},
    deleteEntry(id){const e=data.entries.find(x=>x.id===id);if(!e)return;App.askConfirm('この記録を削除します。よろしいですか？\n\n'+e.subject+'：'+e.content+'（'+fmtMin(e.minutes)+'）',function(){data.entries=data.entries.filter(x=>x.id!==id);persist();render();toast('記録を削除しました');},{yes:'削除する',danger:true});},
    toggleAllRecords(){ui.showAllRecords=!ui.showAllRecords;render();},
    pickSub(i){form.subjectIdx=i;render();},
    toggleEdit(){ui.editSubjects=!ui.editSubjects;render();},
    addSub(){const el=document.getElementById('newsub');if(!el)return;const name=el.value.trim();if(!name){toast('科目名を入力してください');return;}if(data.subjects.some(s=>s.name===name)){toast('同じ名前の科目があります');return;}const color=FALLBACK[data.subjects.length%FALLBACK.length];data.subjects.push({name,color});form.subjectIdx=data.subjects.length-1;persist();render();toast('科目を追加しました');},
    removeSub(i){if(data.subjects.length<=1){toast('科目は1つ以上必要です');return;}data.subjects.splice(i,1);if(form.subjectIdx>=data.subjects.length)form.subjectIdx=data.subjects.length-1;persist();render();},
    setSubColor(i,color){const s=data.subjects[i];if(!s)return;const nm=s.name;s.color=color;data.entries.forEach(e=>{if(e.subject===nm)e.color=color;});persist();render();},
    setF(f,v){form[f]=v;refresh();},
    quick(m){form.hours=String(Math.floor(m/60));form.mins=String(m%60);render();},
    setDate(v){form.date=v;refresh();},
    save(){
      if(!isValid())return;
      const s=data.subjects[form.subjectIdx];
      const minutes=(parseInt(form.hours)||0)*60+(parseInt(form.mins)||0);
      data.entries.push({id:uid(),subject:s.name,color:s.color,content:form.content.trim(),minutes,date:form.date,createdAt:new Date().toISOString(),reviews:{day1:false,week1:false,month1:false}});
      form.content='';form.hours='';form.mins='';
      persist();render();toast('学習を記録しました');
    },
    setRange(r){ui.statsRange=r;ui.editGoal=false;render();},
    editGoal(){ui.editGoal=true;render();},
    cancelGoalEdit(){ui.editGoal=false;render();},
    setGoal(){
      const el=document.getElementById('goalInput');
      if(!el)return;
      const v=parseInt(el.value,10);
      if(!v||v<1||v>9999){toast('目標は 1〜9999 の整数（時間）で入力してください');return;}
      data.summerGoalHours=v;ui.editGoal=false;persist();render();toast('夏期の目標を '+v+'時間 に設定しました');
    },
    clearGoal(){data.summerGoalHours=null;ui.editGoal=false;persist();render();toast('夏期の目標を削除しました');},
    openExport(){ui.modalText=JSON.stringify(data,null,2);ui.modal='export';render();},
    openImport(){ui.modal='import';render();},
    closeModal(){ui.modal=null;render();},
    copyExport(){
      const txt=ui.modalText||'';
      const ta=document.getElementById('modalText');
      if(ta){ta.focus();ta.select();try{ta.setSelectionRange(0,ta.value.length);}catch(e){}}
      if(navigator.clipboard&&navigator.clipboard.writeText){
        navigator.clipboard.writeText(txt).then(function(){toast('コピーしました');}).catch(function(){
          let ok=false;try{ok=document.execCommand('copy');}catch(e){}
          toast(ok?'コピーしました':'上の文章を長押しで全選択してコピーしてください');
        });
      }else{
        let ok=false;try{ok=document.execCommand('copy');}catch(e){}
        toast(ok?'コピーしました':'上の文章を長押しで全選択してコピーしてください');
      }
    },
    async shareExport(){
      const txt=ui.modalText||'';
      if(!navigator.share){toast('この画面では共有を使えません。「コピー」をご利用ください');return;}
      try{
        const file=new File([txt],'study-tracker-backup.json',{type:'application/json'});
        if(navigator.canShare&&navigator.canShare({files:[file]})){await navigator.share({files:[file],title:'学習データのバックアップ'});return;}
        await navigator.share({text:txt,title:'学習データのバックアップ'});
      }catch(e){
        if(e&&e.name==='AbortError')return;
        toast('共有を開けませんでした。「コピー」をご利用ください');
      }
    },
    doImportText(){
      const ta=document.getElementById('importText');
      if(!ta||!ta.value.trim()){toast('バックアップの文章を貼り付けてください');return;}
      applyImport(ta.value);
    },
    importData(ev){
      const file=ev.target.files&&ev.target.files[0];
      if(!file){return;}
      const reader=new FileReader();
      reader.onload=function(){applyImport(reader.result);};
      reader.readAsText(file);
      ev.target.value='';
    }
  };

  render();
})();
</script>
</body>
</html>
