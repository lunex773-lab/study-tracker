<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1E2749">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="学習トラッカー">
<title>学習トラッカー｜神戸大志望</title>
<style>
  :root{
    --ink:#1E2749; --ink-soft:#5A6486; --paper:#EDEFF4; --card:#fff;
    --line:#D9DDE7; --brand:#3B5BA5; --urgent:#D7574B; --field:#F7F8FB;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{
    background:var(--paper); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic","Noto Sans JP",Meiryo,sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.5;
  }
  .mono{font-family:"SF Mono","SFMono-Regular","Roboto Mono",Menlo,Consolas,monospace;font-variant-numeric:tabular-nums;}
  #app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--paper);}
  button{font-family:inherit;cursor:pointer;border:none;background:none;}
  input{font-family:inherit;}

  /* header */
  .header{background:var(--ink);padding:20px 20px 16px;}
  .hrow{display:flex;justify-content:space-between;align-items:flex-start;}
  .brand{font-size:11px;font-weight:700;letter-spacing:.18em;color:#9AA6CC;}
  .aim{font-size:14px;font-weight:600;color:#fff;margin-top:2px;}
  .setbtn{font-size:12px;font-weight:600;color:#C9D2EC;background:rgba(255,255,255,.12);padding:4px 10px;border-radius:7px;}
  .count{display:flex;align-items:flex-end;gap:10px;margin-top:14px;}
  .clabel{font-size:14px;font-weight:500;color:#C9D2EC;padding-bottom:7px;}
  .cnum{font-family:"SF Mono","Roboto Mono",Menlo,monospace;font-variant-numeric:tabular-nums;font-weight:700;font-size:46px;line-height:.9;letter-spacing:-.02em;color:#fff;}
  .cnum.low{color:#FF8A7A;}
  .cunit{font-size:16px;font-weight:700;color:#C9D2EC;padding-bottom:5px;}
  .settings{margin-top:14px;background:rgba(255,255,255,.08);border-radius:10px;padding:12px;}
  .slabel{display:block;font-size:12px;font-weight:600;color:#C9D2EC;margin-bottom:6px;}
  .dateinput{background:var(--field);border:1px solid var(--line);color:var(--ink);font-size:14px;padding:7px 10px;border-radius:8px;}
  .dateinput.light{background:#fff;border:none;}
  .reset{display:block;margin-top:12px;font-size:12px;font-weight:600;color:#FF8A7A;}

  /* tabs */
  .tabs{display:flex;background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10;}
  .tab{flex:1;padding:13px 0;font-size:14px;font-weight:600;color:var(--ink-soft);border-bottom:2px solid transparent;position:relative;}
  .tab.active{color:var(--ink);border-bottom-color:var(--brand);}
  .badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;margin-left:5px;border-radius:9px;background:var(--urgent);color:#fff;font-size:11px;font-weight:700;vertical-align:middle;}

  .body{padding:16px;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
  .foot{text-align:center;font-size:11px;color:#A9B0C4;padding:6px 0 24px;}

  .sect{margin-bottom:18px;}
  .h2{font-size:15px;font-weight:700;margin-bottom:10px;}
  .h3{font-size:13px;font-weight:700;color:var(--ink-soft);margin-bottom:8px;}
  .empty{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:30px 16px;text-align:center;font-size:14px;color:var(--ink-soft);}
  .list{display:flex;flex-direction:column;gap:8px;}
  .dot{display:inline-block;width:11px;height:11px;border-radius:50%;flex-shrink:0;}
  .dot.sm{width:9px;height:9px;}

  /* review cards */
  .rcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;display:flex;align-items:flex-start;gap:11px;}
  .rcard.over{border-color:var(--urgent);}
  .rcard .dot{margin-top:4px;}
  .rbody{flex:1;min-width:0;}
  .rmeta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
  .rsub{font-size:12px;font-weight:700;color:var(--ink-soft);}
  .rtag{font-size:11px;font-weight:600;padding:2px 6px;border-radius:5px;background:#EAEFF8;color:var(--brand);}
  .rtag.tagover{background:#FBE9E7;color:var(--urgent);}
  .overlbl{font-size:11px;font-weight:700;color:var(--urgent);}
  .rcontent{font-size:14px;font-weight:500;margin-top:4px;word-break:break-word;}
  .done{flex-shrink:0;font-size:12px;font-weight:700;color:#fff;background:var(--brand);padding:8px 12px;border-radius:9px;}
  .done:active{opacity:.8;}

  /* upcoming / recent */
  .ucard{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8px 11px;display:flex;align-items:center;gap:9px;font-size:13px;}
  .udate{font-size:12px;color:var(--ink-soft);flex-shrink:0;}
  .ustage{font-size:11px;color:var(--ink-soft);flex-shrink:0;}
  .utext{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .utime{font-size:12px;font-weight:600;color:var(--ink-soft);flex-shrink:0;}

  /* form */
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:18px;}
  .field{display:flex;flex-direction:column;}
  .fhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .flabel{font-size:12px;font-weight:700;color:var(--ink-soft);margin-bottom:8px;}
  .fhead .flabel{margin-bottom:0;}
  .link{font-size:12px;font-weight:600;color:var(--brand);}
  .chips{display:flex;flex-wrap:wrap;gap:8px;}
  .chip{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;padding:7px 12px;border-radius:999px;background:#F2F4F8;border:1px solid var(--line);color:var(--ink);}
  .chip .x{color:var(--urgent);font-weight:700;}
  .addrow{display:flex;gap:8px;margin-top:12px;}
  .input{width:100%;background:var(--field);border:1px solid var(--line);border-radius:9px;padding:10px 12px;font-size:14px;color:var(--ink);}
  .input:focus{outline:none;border-color:var(--brand);}
  .addbtn{flex-shrink:0;font-size:14px;font-weight:700;color:#fff;background:var(--brand);padding:0 16px;border-radius:9px;}
  .timerow{display:flex;align-items:center;gap:8px;}
  .numin{width:60px;text-align:center;background:var(--field);border:1px solid var(--line);border-radius:9px;padding:10px 4px;font-size:14px;color:var(--ink);}
  .numin:focus{outline:none;border-color:var(--brand);}
  .unit{font-size:14px;color:var(--ink-soft);}
  .quick{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
  .qbtn{font-size:12px;font-weight:600;color:var(--ink-soft);background:#F2F4F8;border:1px solid var(--line);padding:5px 10px;border-radius:999px;}
  .save{width:100%;padding:13px;border-radius:10px;font-size:14px;font-weight:700;color:#fff;background:var(--brand);transition:opacity .15s;}
  .save:active{opacity:.85;}
  .save.dis{opacity:.4;}
  .preview{font-size:12px;color:var(--ink-soft);text-align:center;}

  /* stats */
  .toggle{display:inline-flex;background:#E3E7EF;border:1px solid var(--line);border-radius:10px;padding:3px;margin-bottom:16px;}
  .tg{font-size:12px;font-weight:700;color:var(--ink-soft);padding:6px 12px;border-radius:7px;}
  .tg.on{background:var(--card);color:var(--ink);}
  .totwrap{text-align:center;}
  .totlbl{font-size:12px;font-weight:600;color:var(--ink-soft);}
  .totnum{font-size:30px;font-weight:700;letter-spacing:-.01em;}
  .donutwrap{display:flex;justify-content:center;margin:4px 0 8px;}
  .donut{width:200px;height:200px;display:block;}
  .legend{display:flex;flex-direction:column;gap:9px;}
  .leg{display:flex;align-items:center;gap:9px;font-size:13px;}
  .lname{font-weight:600;width:96px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .lbar{flex:1;height:8px;border-radius:999px;background:#EEF0F4;overflow:hidden;}
  .lfill{display:block;height:100%;}
  .ltime{font-size:11px;color:var(--ink-soft);width:74px;text-align:right;flex-shrink:0;}
  .lpct{font-size:11px;font-weight:700;width:38px;text-align:right;flex-shrink:0;}
  .grand{margin-top:14px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;}
  .grandlbl{font-size:13px;font-weight:600;color:var(--ink-soft);}
  .grandnum{font-size:18px;font-weight:700;}

  @media (prefers-reduced-motion: reduce){.body{animation:none;}}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
  'use strict';

  const STORAGE_KEY='kobe-study-tracker:v1';
  const DAY=86400000;

  const DEFAULT_SUBJECTS=[
    {name:'国語', color:'#C0504D'},
    {name:'数学IA', color:'#3B5BA5'},
    {name:'数学IIBC', color:'#6E8FD6'},
    {name:'英語リーディング', color:'#2F7A52'},
    {name:'英語リスニング', color:'#5FA88F'},
    {name:'物理基礎', color:'#E0A458'},
    {name:'化学基礎', color:'#8E6FB0'},
    {name:'地理総合', color:'#5B9279'},
    {name:'政治経済', color:'#9A7B4F'},
    {name:'情報', color:'#4A4E69'},
  ];
  const FALLBACK=['#3B5BA5','#2F7A52','#C0504D','#E0A458','#8E6FB0','#5FA88F','#C77DA0','#7A8B5A','#4A4E69','#A0855B'];
  const DEFAULT_EXAM='2027-01-17';
  const STAGES=[
    {key:'day1',label:'1日後',short:'1日',days:1},
    {key:'week1',label:'1週間後',short:'1週',days:7},
    {key:'month1',label:'1ヶ月後',short:'1月',days:30},
  ];

  /* helpers */
  function uid(){return Math.random().toString(36).slice(2,10);}
  function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
  function startOfDay(d){const x=new Date(d);x.setHours(0,0,0,0);return x;}
  function parseDate(s){const p=s.split('-').map(Number);return new Date(p[0],p[1]-1,p[2]);}
  function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x;}
  function isoDate(d){const x=new Date(d);return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');}
  function todayISO(){return isoDate(new Date());}
  function fmtMD(d){return (d.getMonth()+1)+'月'+d.getDate()+'日';}
  function fmtMin(min){const h=Math.floor(min/60),m=min%60;if(h&&m)return h+'時間'+m+'分';if(h)return h+'時間';return m+'分';}

  /* storage (localStorage + in-memory fallback) */
  function load(){try{const r=localStorage.getItem(STORAGE_KEY);if(r)return JSON.parse(r);}catch(e){}return null;}
  function persist(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(data));}catch(e){}}
  function defaultData(){return {subjects:DEFAULT_SUBJECTS.map(s=>({name:s.name,color:s.color})),entries:[],examDate:DEFAULT_EXAM};}

  let data=load()||defaultData();
  if(!data.subjects||!data.subjects.length)data.subjects=DEFAULT_SUBJECTS.map(s=>({name:s.name,color:s.color}));
  if(!Array.isArray(data.entries))data.entries=[];
  if(!data.examDate)data.examDate=DEFAULT_EXAM;

  let ui={tab:'review',editSubjects:false,statsRange:'week',settingsOpen:false};
  let form={subjectIdx:0,content:'',hours:'',mins:'',date:todayISO()};

  /* donut chart (manual SVG, no libraries) */
  function polar(cx,cy,r,deg){const rad=deg*Math.PI/180;return [cx+r*Math.sin(rad),cy-r*Math.cos(rad)];}
  function arc(cx,cy,rO,rI,a0,a1){
    const large=(a1-a0)>180?1:0;
    const o0=polar(cx,cy,rO,a0),o1=polar(cx,cy,rO,a1),i1=polar(cx,cy,rI,a1),i0=polar(cx,cy,rI,a0);
    return 'M '+o0[0]+' '+o0[1]+' A '+rO+' '+rO+' 0 '+large+' 1 '+o1[0]+' '+o1[1]+
           ' L '+i1[0]+' '+i1[1]+' A '+rI+' '+rI+' 0 '+large+' 0 '+i0[0]+' '+i0[1]+' Z';
  }
  function donut(slices,total){
    const cx=100,cy=100,rO=84,rI=52;
    if(slices.length===1){
      return '<svg viewBox="0 0 200 200" class="donut"><circle cx="100" cy="100" r="'+rO+'" fill="'+slices[0].color+'"/><circle cx="100" cy="100" r="'+rI+'" fill="#fff"/></svg>';
    }
    let a=0,paths='';
    slices.forEach(s=>{const sweep=s.minutes/total*360;paths+='<path d="'+arc(cx,cy,rO,rI,a,a+sweep)+'" fill="'+s.color+'" stroke="#fff" stroke-width="2"/>';a+=sweep;});
    return '<svg viewBox="0 0 200 200" class="donut">'+paths+'</svg>';
  }

  /* computed */
  function dueItems(){
    const t=startOfDay(new Date()).getTime();
    const due=[],up=[];
    data.entries.forEach(e=>{
      STAGES.forEach(st=>{
        if(e.reviews[st.key])return;
        const dd=startOfDay(addDays(parseDate(e.date),st.days));
        const item={e,st,dd,over:dd.getTime()<t};
        if(dd.getTime()<=t)due.push(item);
        else if(dd.getTime()<=t+7*DAY)up.push(item);
      });
    });
    due.sort((a,b)=>a.dd-b.dd||a.st.days-b.st.days);
    up.sort((a,b)=>a.dd-b.dd);
    return {due,up};
  }
  function dueCount(){return dueItems().due.length;}
  function statsData(){
    const days=ui.statsRange==='week'?7:30;
    const today=startOfDay(new Date()).getTime();
    const from=today-(days-1)*DAY;
    const map={};let total=0;
    data.entries.forEach(e=>{
      const d=startOfDay(parseDate(e.date)).getTime();
      if(d<from||d>today)return;
      if(!map[e.subject])map[e.subject]={name:e.subject,color:e.color,minutes:0};
      map[e.subject].minutes+=e.minutes;total+=e.minutes;
    });
    return {slices:Object.values(map).sort((a,b)=>b.minutes-a.minutes),total};
  }
  function isValid(){return !!data.subjects[form.subjectIdx]&&form.content.trim()!==''&&((parseInt(form.hours)||0)*60+(parseInt(form.mins)||0))>0;}

  /* render pieces */
  function headerHTML(){
    const days=Math.ceil((startOfDay(parseDate(data.examDate)).getTime()-startOfDay(new Date()).getTime())/DAY);
    const low=days<=60;
    return '<div class="header"><div class="hrow"><div>'+
      '<div class="brand">STUDY TRACKER</div><div class="aim">神戸大学 志望（文系）</div></div>'+
      '<button class="setbtn" onclick="App.toggleSettings()">設定</button></div>'+
      '<div class="count"><span class="clabel">共通テストまで</span>'+
      '<span class="cnum'+(low?' low':'')+'">'+(days>=0?days:0)+'</span><span class="cunit">日</span></div>'+
      (ui.settingsOpen?
        '<div class="settings"><label class="slabel">試験日（正式な日程に設定）</label>'+
        '<input type="date" value="'+data.examDate+'" onchange="App.setExam(this.value)" class="dateinput light"/>'+
        '<button class="reset" onclick="App.reset()">すべてのデータをリセット</button></div>':'')+
      '</div>';
  }
  function tabsHTML(){
    const dc=dueCount();
    const t=(id,label,b)=>'<button class="tab'+(ui.tab===id?' active':'')+'" onclick="App.setTab(\''+id+'\')">'+label+(b?'<span class="badge">'+b+'</span>':'')+'</button>';
    return '<div class="tabs">'+t('review','復習',dc)+t('record','記録',0)+t('stats','統計',0)+'</div>';
  }
  function reviewHTML(){
    const r=dueItems();
    let h='<div class="sect"><h2 class="h2">今日の復習</h2>';
    if(!r.due.length){
      h+='<div class="empty">今日やるべき復習はありません。<br>「記録」タブから学習を登録しよう。</div>';
    }else{
      h+='<div class="list">';
      r.due.forEach(d=>{
        h+='<div class="rcard'+(d.over?' over':'')+'"><span class="dot" style="background:'+d.e.color+'"></span>'+
           '<div class="rbody"><div class="rmeta"><span class="rsub">'+esc(d.e.subject)+'</span>'+
           '<span class="rtag'+(d.over?' tagover':'')+'">'+d.st.label+'の復習</span>'+
           (d.over?'<span class="overlbl">期限超過</span>':'')+'</div>'+
           '<div class="rcontent">'+esc(d.e.content)+'</div></div>'+
           '<button class="done" onclick="App.markDone(\''+d.e.id+'\',\''+d.st.key+'\')">復習した</button></div>';
      });
      h+='</div>';
    }
    h+='</div>';
    if(r.up.length){
      h+='<div class="sect"><h3 class="h3">今後7日間の予定</h3><div class="list">';
      r.up.forEach(d=>{
        h+='<div class="ucard"><span class="dot sm" style="background:'+d.e.color+'"></span>'+
           '<span class="udate mono">'+fmtMD(d.dd)+'</span><span class="ustage">'+d.st.short+'</span>'+
           '<span class="utext">'+esc(d.e.content)+'</span></div>';
      });
      h+='</div></div>';
    }
    return h;
  }
  function recordHTML(){
    const subs=data.subjects;
    const chips=subs.map((s,i)=>{
      const on=i===form.subjectIdx&&!ui.editSubjects;
      return '<button class="chip'+(on?' on':'')+'" style="'+(on?'background:'+s.color+';border-color:'+s.color+';color:#fff':'')+'" onclick="App.'+(ui.editSubjects?'removeSub':'pickSub')+'('+i+')">'+
        (on?'':'<span class="dot sm" style="background:'+s.color+'"></span>')+esc(s.name)+(ui.editSubjects?'<span class="x">×</span>':'')+'</button>';
    }).join('');
    const recent=data.entries.slice().sort((a,b)=>a.createdAt<b.createdAt?1:-1).slice(0,6);
    let recentHTML='';
    if(recent.length){
      recentHTML='<div class="sect"><h3 class="h3">最近の記録</h3><div class="list">'+recent.map(e=>
        '<div class="ucard"><span class="dot sm" style="background:'+e.color+'"></span>'+
        '<span class="udate">'+fmtMD(parseDate(e.date))+'</span><span class="utext">'+esc(e.content)+'</span>'+
        '<span class="utime mono">'+fmtMin(e.minutes)+'</span></div>').join('')+'</div></div>';
    }
    return '<div class="card">'+
      '<div class="field"><div class="fhead"><label class="flabel">科目</label>'+
        '<button class="link" onclick="App.toggleEdit()">'+(ui.editSubjects?'完了':'科目を編集')+'</button></div>'+
        '<div class="chips">'+chips+'</div>'+
        (ui.editSubjects?'<div class="addrow"><input id="newsub" class="input" placeholder="科目を追加（例：倫理）"/><button class="addbtn" onclick="App.addSub()">追加</button></div>':'')+
      '</div>'+
      '<div class="field"><label class="flabel">学習内容</label>'+
        '<input id="f_content" class="input" placeholder="例：ベクトルの内積、長文 Unit5 …" value="'+esc(form.content)+'" oninput="App.setF(\'content\',this.value)"/></div>'+
      '<div class="field"><label class="flabel">学習時間</label><div class="timerow">'+
        '<input id="f_h" type="number" min="0" inputmode="numeric" class="numin" placeholder="0" value="'+esc(form.hours)+'" oninput="App.setF(\'hours\',this.value)"/><span class="unit">時間</span>'+
        '<input id="f_m" type="number" min="0" max="59" inputmode="numeric" class="numin" placeholder="0" value="'+esc(form.mins)+'" oninput="App.setF(\'mins\',this.value)"/><span class="unit">分</span></div>'+
        '<div class="quick">'+[15,30,45,60,90,120].map(m=>'<button class="qbtn" onclick="App.quick('+m+')">'+fmtMin(m)+'</button>').join('')+'</div></div>'+
      '<div class="field"><label class="flabel">学習日（この日を基準に復習日が決まる）</label>'+
        '<input type="date" class="dateinput" value="'+form.date+'" onchange="App.setDate(this.value)"/></div>'+
      '<button id="saveBtn" class="save" onclick="App.save()">記録する</button>'+
      '<p class="preview" id="prev"></p>'+
      '</div>'+recentHTML;
  }
  function statsHTML(){
    const s=statsData();
    const grand=data.entries.reduce((a,e)=>a+e.minutes,0);
    const toggle='<div class="toggle">'+
      '<button class="tg'+(ui.statsRange==='week'?' on':'')+'" onclick="App.setRange(\'week\')">今週（7日間）</button>'+
      '<button class="tg'+(ui.statsRange==='month'?' on':'')+'" onclick="App.setRange(\'month\')">今月（30日間）</button></div>';
    let body;
    if(!s.slices.length){
      body='<div class="card"><div class="empty">この期間の記録はまだありません。</div></div>';
    }else{
      const legend=s.slices.map(x=>{
        const pct=Math.round(x.minutes/s.total*100);
        return '<div class="leg"><span class="dot" style="background:'+x.color+'"></span>'+
          '<span class="lname">'+esc(x.name)+'</span>'+
          '<span class="lbar"><span class="lfill" style="width:'+pct+'%;background:'+x.color+'"></span></span>'+
          '<span class="ltime mono">'+fmtMin(x.minutes)+'</span><span class="lpct mono">'+pct+'%</span></div>';
      }).join('');
      body='<div class="card"><div class="totwrap"><span class="totlbl">合計学習時間</span>'+
        '<div class="totnum mono">'+fmtMin(s.total)+'</div></div>'+
        '<div class="donutwrap">'+donut(s.slices,s.total)+'</div>'+
        '<div class="legend">'+legend+'</div></div>';
    }
    return toggle+body+
      '<div class="grand"><span class="grandlbl">これまでの総学習時間</span><span class="grandnum mono">'+fmtMin(grand)+'</span></div>';
  }

  function render(){
    let c;
    if(ui.tab==='review')c=reviewHTML();
    else if(ui.tab==='record')c=recordHTML();
    else c=statsHTML();
    document.getElementById('app').innerHTML=
      headerHTML()+tabsHTML()+'<div class="body">'+c+'</div>'+
      '<div class="foot">記録は自動で保存され、次に開いても残ります</div>';
    if(ui.tab==='record')refresh();
  }

  /* keeps focus while typing: updates only the save button + preview */
  function refresh(){
    const v=isValid();
    const btn=document.getElementById('saveBtn');
    if(btn){btn.disabled=!v;btn.classList.toggle('dis',!v);}
    const p=document.getElementById('prev');
    if(p){
      if(v){const d=parseDate(form.date);p.textContent='復習予定 → '+fmtMD(addDays(d,1))+'・'+fmtMD(addDays(d,7))+'・'+fmtMD(addDays(d,30));p.style.display='block';}
      else p.style.display='none';
    }
  }

  /* actions */
  window.App={
    setTab(t){ui.tab=t;ui.editSubjects=false;render();},
    toggleSettings(){ui.settingsOpen=!ui.settingsOpen;render();},
    setExam(v){data.examDate=v;persist();render();},
    reset(){if(confirm('すべての記録を削除します。よろしいですか？')){data=defaultData();data.examDate=document.querySelector('.dateinput')?data.examDate:data.examDate;ui={tab:'review',editSubjects:false,statsRange:'week',settingsOpen:false};form={subjectIdx:0,content:'',hours:'',mins:'',date:todayISO()};persist();render();}},
    markDone(id,key){const e=data.entries.find(x=>x.id===id);if(e){e.reviews[key]=true;persist();render();}},
    pickSub(i){form.subjectIdx=i;render();},
    toggleEdit(){ui.editSubjects=!ui.editSubjects;render();},
    addSub(){const el=document.getElementById('newsub');if(!el)return;const name=el.value.trim();if(!name||data.subjects.some(s=>s.name===name))return;const color=FALLBACK[data.subjects.length%FALLBACK.length];data.subjects.push({name,color});form.subjectIdx=data.subjects.length-1;persist();render();},
    removeSub(i){if(data.subjects.length<=1)return;data.subjects.splice(i,1);if(form.subjectIdx>=data.subjects.length)form.subjectIdx=data.subjects.length-1;persist();render();},
    setF(f,v){form[f]=v;refresh();},
    quick(m){form.hours=String(Math.floor(m/60));form.mins=String(m%60);render();},
    setDate(v){form.date=v;refresh();},
    save(){
      if(!isValid())return;
      const s=data.subjects[form.subjectIdx];
      const minutes=(parseInt(form.hours)||0)*60+(parseInt(form.mins)||0);
      data.entries.push({id:uid(),subject:s.name,color:s.color,content:form.content.trim(),minutes,date:form.date,createdAt:new Date().toISOString(),reviews:{day1:false,week1:false,month1:false}});
      form.content='';form.hours='';form.mins='';
      persist();render();
    },
    setRange(r){ui.statsRange=r;render();}
  };

  render();
})();
</script>
</body>
</html>
